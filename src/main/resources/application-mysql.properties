# MySQL Configuration
server.port=${PORT:8080}

# Database connection — URL kept clean (no query params) to avoid & encoding issues in env vars
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/portfolio_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:AAww22@#}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MySQL connection properties (set via HikariCP to avoid URL encoding issues)
spring.datasource.hikari.data-source-properties.useSSL=${MYSQL_USE_SSL:false}
spring.datasource.hikari.data-source-properties.verifyServerCertificate=false
spring.datasource.hikari.data-source-properties.serverTimezone=UTC
spring.datasource.hikari.data-source-properties.allowPublicKeyRetrieval=true
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# Hibernate configurations
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Disable open-in-view warning
spring.jpa.open-in-view=false

# Gmail SMTP Email Notification Configuration
# To enable: generate a Gmail App Password at https://myaccount.google.com/apppasswords
# Then set your credentials below (requires 2-Step Verification enabled on Google account)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email recipient for notifications
portfolio.notification.email=narasimhanaik591@gmail.com
