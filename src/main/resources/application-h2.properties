# H2 Database Configuration
server.port=8080

spring.datasource.url=jdbc:h2:mem:portfolio_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console enablement (to view database tables at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.h2.console.settings.trace=false

# Hibernate configurations
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable open-in-view warning
spring.jpa.open-in-view=false

# Gmail SMTP Email Notification Configuration
# To enable: generate a Gmail App Password at https://myaccount.google.com/apppasswords
# Then set your credentials below (requires 2-Step Verification enabled on Google account)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Email recipient for notifications
portfolio.notification.email=narasimhanaik591@gmail.com
